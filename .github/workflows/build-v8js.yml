name: Build v8js layer

on:
  push:
    branches:
      - cursor/v8js-extension-51ff
    paths:
      - layers/v8js/**
      - .github/workflows/build-v8js.yml
  workflow_dispatch:
    inputs:
      php_version:
        description: PHP version to build
        required: true
        default: '84'
        type: choice
        options:
          # - '82'
          # - '83'
          - '84'
      publish:
        description: Publish layer to AWS (requires AWS_ACCESS_KEY and AWS_ACCESS_SECRET secrets)
        required: false
        default: false
        type: boolean
      aws_region:
        description: AWS region for publishing (only used when publish is enabled)
        required: false
        default: eu-west-1
        type: string

jobs:
  build:
    name: Build v8js PHP ${{ github.event.inputs.php_version || '84' }}
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      DOCKER_BUILDKIT: '1'
      PHP_VERSION: ${{ github.event.inputs.php_version || '84' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Maximize build disk space
        uses: easimon/maximize-build-space-action@v10
        with:
          root-reserve-mb: 2048
          swap-size-mb: 1024
          remove-dotnet: true
          remove-android: true
          remove-haskell: true

      - name: Show available disk space
        run: df -h

      - name: Build docker image
        run: layer=v8js php_versions=${{ env.PHP_VERSION }} make docker-images

      - name: Test layer
        run: layer=v8js php_versions=${{ env.PHP_VERSION }} make test

      - name: Export layer zip
        run: layer=v8js php_versions=${{ env.PHP_VERSION }} make layers

      - name: Upload layer artifact
        uses: actions/upload-artifact@v4
        with:
          name: layer-v8js-php-${{ env.PHP_VERSION }}
          path: export/layer-v8js-php-${{ env.PHP_VERSION }}.zip
          retention-days: 14

      - name: Publish layer to AWS
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.publish == 'true'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_ACCESS_SECRET }}
          only_region: ${{ github.event.inputs.aws_region }}
        run: |
          composer update --no-interaction --prefer-dist --optimize-autoloader --prefer-stable
          php ./bref-extra publish
